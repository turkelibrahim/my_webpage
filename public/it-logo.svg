<svg width="360" height="96" viewBox="0 0 360 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">İbrahim Türkel IT AI Logo</title>
  <desc id="desc">A dark AI-themed logo with circuit lines, a brain outline, and IT initials.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="360" y2="96" gradientUnits="userSpaceOnUse">
      <stop stop-color="#061522"/>
      <stop offset="0.55" stop-color="#082336"/>
      <stop offset="1" stop-color="#050B16"/>
    </linearGradient>
    <linearGradient id="gold" x1="95" y1="13" x2="221" y2="86" gradientUnits="userSpaceOnUse">
